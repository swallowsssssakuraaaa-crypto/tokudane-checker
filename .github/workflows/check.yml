name: tokudane-check

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python check_tokudane.py